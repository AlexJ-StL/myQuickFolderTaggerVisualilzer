[project]
name = "myquickfoldertaggervisualizer"
version = "0.1.0"
description = "A collection of Python visualization scripts designed to analyze and graphically represent codebase metadata generated by the myQuickFolderTagger tool."
readme = "README.md"
requires-python = ">=3.14"
dependencies = [
    "pandas",
    "matplotlib",
    "seaborn",
    "networkx",
    "scikit-learn",
    "pytest",
    "pytest-cov",
    "ruff",
    "mypy",
    "directory-tree",
    "pyproject-toml>=0.1.0",
]
